# Starter pipeline
# Start with a minimal pipeline that you can customize to build and deploy your code.
# Add steps that build, run tests, deploy, and more:
#test comment 2
# https://aka.ms/yaml

trigger:
- main

pool:
  vmImage: ubuntu-latest

steps:
- script: echo Hello, world!
  displayName: 'Run a one-line script'

- script: |
    echo Add other tasks to build, test, and deploy your project.
    echo See https://aka.ms/yaml
  displayName: 'Run a multi-line script now'

- task: CmdLine@2
  displayName: Curl Example
  inputs:
    script: 'curl -vv --location --insecure --request POST ''https://app-staging.apiiro.com/rest-api/v1/BuildScan/builds'' -data "$(playground-payload)" -H "Authorization: Bearer $(playground-token)" -H ''Content-Type: application/json'''